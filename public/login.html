<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login — Isko Barbers</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
  :root { --black:#0a0a0a;--gold:#f5c518;--gold-dark:#c9a10d;--white:#f5f5f0;--gray:#1c1c1c;--gray-mid:#2e2e2e;--text-muted:#9a9a8a; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--black);color:var(--white);
    font-family:'Lato',sans-serif;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
    background-image:
      repeating-linear-gradient(90deg,transparent,transparent 79px,rgba(255,255,255,.015) 80px),
      repeating-linear-gradient(0deg,transparent,transparent 79px,rgba(255,255,255,.015) 80px);
  }

  .login-card{
    width:100%;max-width:420px;
    background:var(--gray);
    padding:52px 48px;
    position:relative;
    animation:slideUp .4s ease both;
  }
  .login-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:var(--gold);
  }
  @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

  .logo{
    font-family:'Bebas Neue',sans-serif;font-size:2rem;
    letter-spacing:4px;color:var(--gold);margin-bottom:4px;
  }
  .logo-sub{
    font-family:'Oswald',sans-serif;font-size:.72rem;
    letter-spacing:4px;text-transform:uppercase;
    color:var(--text-muted);margin-bottom:40px;
  }
  h2{
    font-family:'Bebas Neue',sans-serif;font-size:1.6rem;
    letter-spacing:2px;margin-bottom:28px;
  }

  .form-group{margin-bottom:20px}
  .form-group label{
    display:block;font-family:'Oswald',sans-serif;font-size:.72rem;
    letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);
    margin-bottom:8px;
  }
  .form-group input{
    width:100%;background:var(--black);
    border:1px solid rgba(255,255,255,.1);
    color:var(--white);padding:12px 16px;
    font-family:'Lato',sans-serif;font-size:.95rem;
    outline:none;transition:border-color .2s;
  }
  .form-group input:focus{border-color:var(--gold);}

  .btn-login{
    width:100%;background:var(--gold);color:var(--black);
    font-family:'Oswald',sans-serif;font-weight:700;
    letter-spacing:3px;text-transform:uppercase;
    padding:14px;font-size:.9rem;border:none;cursor:pointer;
    clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
    transition:background .2s;margin-top:8px;
  }
  .btn-login:hover{background:var(--gold-dark)}
  .btn-login:disabled{opacity:.5;cursor:not-allowed}

  .error-msg{
    background:rgba(220,50,50,.15);border:1px solid rgba(220,50,50,.4);
    color:#ff6b6b;padding:12px 16px;font-size:.84rem;
    margin-top:16px;display:none;
  }

  .back-link{
    display:block;text-align:center;margin-top:28px;
    color:var(--text-muted);text-decoration:none;font-size:.82rem;
    font-family:'Oswald',sans-serif;letter-spacing:2px;
    transition:color .2s;
  }
  .back-link:hover{color:var(--gold)}

  .lock-icon{font-size:2.5rem;margin-bottom:20px;display:block}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">ISKO BARBERS</div>
  <div class="logo-sub">Admin Portal</div>
  <span class="lock-icon">🔐</span>
  <h2>SIGN IN</h2>

  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="admin" autocomplete="username" autofocus/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In →</button>
  <div class="error-msg" id="errorMsg"></div>
  <a href="/" class="back-link">← Back to Website</a>
</div>

<script>
  // Allow pressing Enter to submit
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const btn  = document.getElementById('loginBtn');
    const err  = document.getElementById('errorMsg');
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;

    err.style.display = 'none';
    if (!user || !pass) { showError('Please enter username and password.'); return; }

    btn.textContent = 'Signing in...';
    btn.disabled = true;

    try {
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass })
      });
      const data = await res.json();

      if (data.success) {
        window.location.href = '/admin.html';
      } else {
        showError(data.message);
        btn.textContent = 'Sign In →';
        btn.disabled = false;
      }
    } catch (e) {
      showError('Cannot connect to server. Is it running?');
      btn.textContent = 'Sign In →';
      btn.disabled = false;
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
